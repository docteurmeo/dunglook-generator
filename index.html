<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ĐÚNG LOOK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Be+Vietnam+Pro:wght@400;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brandLogo" aria-label="ĐÚNG LOOK">
      <img class="brand-logo" src="brand/logo.svg" alt="ĐÚNG LOOK"
           onerror="this.remove()" />
      <span class="brand-fallback">ĐÚNG LOOK</span>
    </div>
    <div class="counter"><span id="counterLabel">0</span> look đã tạo</div>
  </header>

  <main class="stage">
    <div class="canvas-wrap" id="canvasWrap" data-state="idle">
      <svg id="canvas" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg"
           preserveAspectRatio="xMidYMid meet" aria-label="Sticker"></svg>
    </div>
  </main>

  <div class="controls">
    <button id="generateBtn" class="btn pill" type="button">
      <span class="btn-label">Generate</span>
      <span class="btn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
          <path d="M12 2 L13.8 9.6 L21 11 L13.8 12.4 L12 22 L10.2 12.4 L3 11 L10.2 9.6 Z"
                fill="#ec008c" />
        </svg>
      </span>
    </button>

    <div id="downloadGroup" class="download-group hidden">
      <button id="downloadSvgBtn" class="link-btn" type="button">
        Download SVG
      </button>
      <span class="dot">·</span>
      <button id="downloadPngBtn" class="link-btn" type="button">
        Download PNG
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
